spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/jrecruiter_notifications
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      leak-detection-threshold: 60000

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  thymeleaf:
    cache: true

logging:
  level:
    root: INFO
    com.jrecruiter: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c{1.}","msg":"%msg"}%n'
  file:
    name: /var/log/jrecruiter/notification-service.log
    max-size: 10MB
    max-history: 30

server:
  port: 8080
