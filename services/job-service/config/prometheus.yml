global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "job-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["job-service:8080"]
    scrape_interval: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
    scrape_interval: 30s
