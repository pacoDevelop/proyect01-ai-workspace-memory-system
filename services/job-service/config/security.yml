security:
  jwt:
    secret: ${JWT_SECRET:default_secret_key_change_in_production}
    expiration: ${JWT_EXPIRATION:86400000} # 24 hours
    issuer: ${JWT_ISSUER:jrecruiter}
    audience: ${JWT_AUDIENCE:jrecruiter-api}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Content-Type,Authorization,Accept}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  rate-limiting:
    enabled: ${RATE_LIMITING_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_REQUESTS:100}
    burst-requests: ${RATE_LIMIT_BURST:20}