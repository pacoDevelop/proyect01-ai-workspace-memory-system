spring:
  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672

logging:
  level:
    root: WARN
    com.jrecruiter: DEBUG
    org.springframework.test: DEBUG

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: "*"

# Test-specific settings
business:
  features:
    dual-write-enabled: false
    feature-flags-enabled: false
  consistency:
    check-interval-minutes: 1
    auto-remediation-enabled: false
