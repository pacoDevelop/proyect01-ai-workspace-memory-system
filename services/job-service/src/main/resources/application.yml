spring:
  application:
    name: job-service
    version: 1.0.0

  profiles:
    active: ${SPRING_PROFILE_ACTIVE:dev}

  # ========== JPA / HIBERNATE ==========
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # ========== DATASOURCE ==========
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true

  # ========== RABBITMQ ==========
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/jrecruiter}
    connection-timeout: 10000
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        acknowledge-mode: manual
        default-requeue-rejected: true
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-interval: 10000
        multiplier: 2.0
        max-attempts: 3
      exchange: job-events

  # ========== JACKSON ==========
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  # ========== SECURITY ==========
  security:
    filter:
      order: 5
    user:
      name: ${SECURITY_USERNAME:admin}
      password: ${SECURITY_PASSWORD:admin}

# ========== LOGGING ==========
logging:
  level:
    root: INFO
    com.jrecruiter: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ========== ACTUATOR / MONITORING ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  health:
    diskspace:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# ========== SERVER ==========
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    accept-count: 100
    max-connections: 10000
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# ========== FLYWAY ==========
flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true
  out-of-order: false

# ========== JWT ==========
jwt:
  secret: ${JWT_SECRET:default_secret_key_change_in_production}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}
  issuer: ${JWT_ISSUER:jrecruiter}
  audience: ${JWT_AUDIENCE:jrecruiter-api}

# ========== BUSINESS CONFIGURATION ==========
business:
  features:
    dual-write-enabled: ${DUAL_WRITE_ENABLED:false}
    feature-flags-enabled: ${FEATURE_FLAGS_ENABLED:true}
  consistency:
    check-interval-minutes: ${CONSISTENCY_CHECK_INTERVAL:5}
    auto-remediation-enabled: ${AUTO_REMEDIATION:true}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: Content-Type,Authorization,Accept
      allow-credentials: true
    rate-limiting:
      enabled: true
      requests-per-minute: 100
      burst-requests: 20
