version: '3.8'

services:
  # ======================== POSTGRES SHARED DATABASE ========================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=jrecruiter
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jrecruiter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ======================== RABBITMQ SHARED MESSAGE BROKER ========================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
      - RABBITMQ_DEFAULT_VHOST=/jrecruiter
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - jrecruiter-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ======================== JOB SERVICE ========================
  job-service:
    build:
      context: ./services/job-service
      dockerfile: Dockerfile
    container_name: job-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=jrecruiter_jobs
      - DB_USER=job_service
      - DB_PASSWORD=password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/jrecruiter
      - JWT_SECRET=development_secret_key_change_in_production
      - JWT_EXPIRATION=86400000
      - JWT_ISSUER=jrecruiter-job-service
      - JWT_AUDIENCE=jrecruiter-clients
      - LOGGING_LEVEL_COM_JRECRUITER=DEBUG
      - LOGGING_LEVEL_ROOT=INFO
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - jrecruiter-network
    volumes:
      - ./logs/job-service:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ======================== USER SERVICE ========================
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=jrecruiter_users
      - DB_USER=user_service
      - DB_PASSWORD=password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/jrecruiter
      - JWT_SECRET=development_secret_key_change_in_production
      - JWT_EXPIRATION=86400000
      - JWT_ISSUER=jrecruiter-user-service
      - JWT_AUDIENCE=jrecruiter-clients
      - LOGGING_LEVEL_COM_JRECRUITER=DEBUG
      - LOGGING_LEVEL_ROOT=INFO
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - jrecruiter-network
    volumes:
      - ./logs/user-service:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ======================== PROMETHEUS MONITORING ========================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - jrecruiter-network
    depends_on:
      - job-service
      - user-service

  # ======================== GRAFANA VISUALIZATION ========================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-worldmap-panel
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - jrecruiter-network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  jrecruiter-network:
    driver: bridge
